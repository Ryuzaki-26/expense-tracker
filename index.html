<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <h1>Expense Tracker</h1>

        <div class="expense-form">

            <input
                type="text"
                id="name"
                placeholder="Expense Name"
            >

            <input
                type="number"
                id="amount"
                placeholder="Amount"
            >

            <select id="category">
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Others">Others</option>
            </select>

            <input
                type="date"
                id="date"
            >

            <button id="addBtn">
                Add Expense
            </button>

        </div>

        <div class="budget-section">

    <input
        type="number"
        id="budgetInput"
        placeholder="Enter Monthly Budget"
    >

    <button id="setBudgetBtn">
        Set Budget
    </button>

    </div>

    <div class="budget-info">

        <h3>
            Budget:
            ₹<span id="budgetAmount">0</span>
        </h3>

        <h3>
            Remaining:
            ₹<span id="remainingAmount">0</span>
        </h3>

    </div>
        
        <div class="summary">

            <h2>
                Total Expense:
                ₹<span id="totalExpense">0</span>
            </h2>

        </div>
    
    <div class="search-box">
    <input
        type="text"
        id="searchInput"
        placeholder="Search Expense..."
    >
    </div>

    <select id="filterCategory">

        <option value="All">
            All Categories
        </option>

        <option value="Food">
            Food
        </option>

        <option value="Travel">
            Travel
        </option>

        <option value="Shopping">
            Shopping
        </option>

        <option value="Bills">
            Bills
        </option>

    </select>
    <br>
    <br>
        <table>

            <thead>

                <tr>
                    <th>Name</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody id="expenseList">

            </tbody>

        </table>

    </div>
    

    <script src="js/app.js"></script>

</body>
</html>
